spring:
  application:
    name: houseburgergrill-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jackson:
    time-zone: America/Fortaleza

server:
  servlet:
    context-path: /
  error:
    include-message: always

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: ${JWT_ACCESS_EXPIRATION:PT15M}
      refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:P7D}
